name: release gate

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  package:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: darwin-aarch64
          - runner: macos-15-intel
            platform: darwin-x86_64
          - runner: ubuntu-24.04
            platform: linux-x86_64
          - runner: ubuntu-24.04-arm
            platform: linux-aarch64
          - runner: windows-2025
            platform: windows-x86_64

    steps:
      - name: Check out Vev
        uses: actions/checkout@v4
        with:
          path: vev

      - name: Check out Kvist
        uses: actions/checkout@v4
        with:
          repository: kvist-lang/kvist
          path: kvist
          fetch-depth: 0

      - name: Select pinned Kvist revision
        working-directory: kvist
        run: git checkout --detach "$(cat ../vev/KVIST_REVISION)"

      - name: Install Odin
        uses: laytan/setup-odin@v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install Windows native dependencies
        if: runner.os == 'Windows'
        run: |
          choco install pkgconfiglite -y
          node_version="$(node -p 'process.versions.node')"
          for attempt in 1 2 3; do
            if npx --yes node-gyp install "$node_version"; then
              break
            fi
            if [[ "$attempt" == 3 ]]; then
              exit 1
            fi
            sleep 5
          done
          node_gyp_root="$(cygpath -u "$LOCALAPPDATA")/node-gyp/Cache/$node_version"
          echo "NODE_INCLUDE_DIR=$(cygpath -m "$node_gyp_root/include/node")" >> "$GITHUB_ENV"
          echo "NODE_LIB=$(cygpath -m "$node_gyp_root/x64/node.lib")" >> "$GITHUB_ENV"

      - name: Build Kvist
        working-directory: kvist
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            editbin="$(find "/c/Program Files/Microsoft Visual Studio" -path '*/bin/Hostx64/x64/editbin.exe' -print -quit)"
            test -n "$editbin"
            odin_exe="$(command -v odin).exe"
            test -f "$odin_exe"
            "$editbin" /STACK:67108864 "$(cygpath -w "$odin_exe")"
            objdump -p "$odin_exe" | grep "SizeOfStackReserve"
            odin build src/cli/kvist -o:speed -extra-linker-flags:"/STACK:67108864" -out:./kvist.exe
            objdump -p ./kvist.exe | grep "SizeOfStackReserve"
          else
            odin build src/cli/kvist -o:speed -out:./kvist
          fi
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Verify release environment
        working-directory: vev
        env:
          VEV_EXPECT_PLATFORM: ${{ matrix.platform }}
        run: scripts/check_release_environment.sh

      - name: Build and smoke release
        working-directory: vev
        env:
          KVIST_BIN: ${{ runner.os == 'Windows' && 'kvist.exe' || 'kvist' }}
          VEV_EXPECT_PLATFORM: ${{ matrix.platform }}
        run: scripts/build_release.sh

      - name: Upload verified platform release
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            vev/build/release/**
            vev/build/jvm/*.jar
            vev/build/jvm/*.pom

  manifest:
    name: combined release
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Download macOS release
        uses: actions/download-artifact@v4
        with:
          name: release-darwin-aarch64
          path: dist/darwin-aarch64

      - name: Download Linux release
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x86_64
          path: dist/linux-x86_64

      - name: Download Linux ARM release
        uses: actions/download-artifact@v4
        with:
          name: release-linux-aarch64
          path: dist/linux-aarch64

      - name: Download Intel macOS release
        uses: actions/download-artifact@v4
        with:
          name: release-darwin-x86_64
          path: dist/darwin-x86_64

      - name: Download Windows release
        uses: actions/download-artifact@v4
        with:
          name: release-windows-x86_64
          path: dist/windows-x86_64

      - name: Combine manifests
        run: |
          scripts/combine_release_manifests.py \
            --output dist/manifest.json \
            dist/darwin-aarch64/release/manifest.json \
            dist/darwin-x86_64/release/manifest.json \
            dist/linux-x86_64/release/manifest.json \
            dist/linux-aarch64/release/manifest.json \
            dist/windows-x86_64/release/manifest.json

      - name: Assemble cross-platform JVM release
        run: |
          scripts/assemble_jvm_release.sh \
            "$(cat VERSION)" \
            dist/jvm \
            dist/m2 \
            dist/darwin-aarch64/jvm \
            dist/darwin-x86_64/jvm \
            dist/linux-x86_64/jvm \
            dist/linux-aarch64/jvm \
            dist/windows-x86_64/jvm

      - name: Record cross-platform JVM artifacts
        run: |
          scripts/add_combined_jvm_artifacts.py \
            --manifest dist/manifest.json \
            --jvm-dir dist/jvm

      - name: Smoke fresh JVM coordinate consumers
        run: scripts/smoke_jvm_remote_coordinates.sh "$(cat VERSION)" dist/m2

      - name: Smoke Clojure Git coordinate consumer
        run: scripts/smoke_clojure_git_coordinates.sh "$(cat VERSION)" dist/m2

      - name: Upload combined release
        uses: actions/upload-artifact@v4
        with:
          name: release-combined
          if-no-files-found: error
          path: |
            dist/manifest.json
            dist/jvm/**

  prerelease:
    name: GitHub prerelease
    if: startsWith(github.ref, 'refs/tags/v')
    needs: manifest
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download verified releases
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist

      - name: Collect release files
        run: |
          mkdir -p upload
          cp dist/release-combined/manifest.json upload/
          cp dist/release-combined/jvm/* upload/
          for platform in \
            darwin-aarch64 \
            darwin-x86_64 \
            linux-aarch64 \
            linux-x86_64 \
            windows-x86_64; do
            cp "dist/release-$platform/release/cli/"* upload/
            cp "dist/release-$platform/release/native/"* upload/
          done
          cp dist/release-linux-x86_64/release/source/* upload/
          (cd upload && shasum -a 256 *) > upload/SHA256SUMS

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --prerelease \
            --generate-notes \
            --title "VevDB ${GITHUB_REF_NAME}" \
            upload/*

  public-jvm-acceptance:
    name: published JVM release acceptance
    if: startsWith(github.ref, 'refs/tags/v')
    needs: prerelease
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Smoke published Java and Clojure artifacts
        run: |
          scripts/smoke_public_jvm_release.sh \
            "${GITHUB_REF_NAME}" \
            "$(cat VERSION)" \
            "${GITHUB_REPOSITORY}"
