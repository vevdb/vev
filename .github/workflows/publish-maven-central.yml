name: Stage Maven Central deployment

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Published VevDB GitHub release tag
        required: true
        type: string
      version:
        description: Maven artifact version
        required: true
        type: string

permissions:
  contents: read

jobs:
  stage:
    name: Sign, validate, and upload
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Download verified JVM release files
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p jvm
          gh release download "$RELEASE_TAG" \
            --pattern "vev-java-$VERSION*" \
            --pattern "vev-clj-$VERSION*" \
            --dir jvm
          scripts/validate_maven_central_inputs.sh "$VERSION" jvm

      - name: Import release signing key
        env:
          CENTRAL_GPG_PRIVATE_KEY: ${{ secrets.CENTRAL_GPG_PRIVATE_KEY }}
        run: |
          test -n "$CENTRAL_GPG_PRIVATE_KEY"
          printf '%s' "$CENTRAL_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Build signed Central bundle
        env:
          CENTRAL_GPG_KEY_ID: ${{ secrets.CENTRAL_GPG_KEY_ID }}
          CENTRAL_GPG_PASSPHRASE: ${{ secrets.CENTRAL_GPG_PASSPHRASE }}
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p central
          scripts/package_maven_central_bundle.sh \
            "$VERSION" \
            jvm \
            "central/vevdb-$VERSION.zip"

      - name: Upload user-managed deployment
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          VERSION: ${{ inputs.version }}
        run: |
          test -n "$CENTRAL_USERNAME"
          test -n "$CENTRAL_PASSWORD"
          bearer="$(
            printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" |
              base64 |
              tr -d '\n'
          )"
          deployment_id="$(
            curl \
              --fail-with-body \
              --request POST \
              --header "Authorization: Bearer $bearer" \
              --form "bundle=@central/vevdb-$VERSION.zip" \
              "https://central.sonatype.com/api/v1/publisher/upload?publishingType=USER_MANAGED&name=VevDB-$VERSION"
          )"
          test -n "$deployment_id"
          {
            echo "## Maven Central deployment staged"
            echo
            echo "- Version: \`$VERSION\`"
            echo "- Deployment ID: \`$deployment_id\`"
            echo "- Publishing mode: user managed"
            echo
            echo "Validate the deployment in the Central Portal before publishing."
          } >> "$GITHUB_STEP_SUMMARY"
